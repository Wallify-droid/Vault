name: Build APK

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Unzip the project
        # This extracts your zip file so the server can access the code
        run: unzip AppVault.zip

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7' 

      - name: Build Debug APK
        # Now this will successfully find the unzipped AppVault folder
        run: gradle assembleDebug -p AppVault

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: AppVault/app/build/outputs/apk/debug/app-debug.apk
